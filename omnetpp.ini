##########################################################
#            消融对照测试配置                           #
##########################################################

# 消融对照测试配置 - 用于生成第五个性能测试：去掉IT2/Choquet/OWA-RL后收益雷达对比
[Config Ablation_Study_Test]
extends = General

cmdenv-express-mode = true
cmdenv-autoflush = true
cmdenv-status-frequency = 1s
**.cmdenv-log-level = info

# 仿真基本参数
sim-time-limit = 300s
repeat = 5  # 每个模型配置运行5次独立实验

# 模型配置参数化：4种不同的模型配置
# full = 完整模型（含IT2 + Choquet + OWA-RL）
# no_IT2 = 去掉IT2模块后的模型
# no_Choquet = 去掉Choquet-OWA模块后的模型
# no_RL = 去掉OWA-RL模块后的模型
*.node[*].appl.ablationModelType = ${modelType="full", "no_IT2", "no_Choquet", "no_RL"}
*.rsu[*].appl.ablationModelType = ${modelType}

# 消融对照测试数据收集核心配置
*.node[*].appl.enableAblationCollection = true
*.node[*].appl.exportAblationToCSV = true
*.node[*].appl.ablationSamplingInterval = 1.0s
*.node[*].appl.ablationOutputDirectory = "results/Ablation/data/"

*.rsu[*].appl.enableAblationCollection = true
*.rsu[*].appl.exportAblationToCSV = true
*.rsu[*].appl.ablationSamplingInterval = 1.0s
*.rsu[*].appl.ablationOutputDirectory = "results/Ablation/data/"

# 节点数量配置（确保有足够数据）
*.numNodes = 30

# 更新间隔配置（标准频率）
*.node[*].appl.trustUpdateInterval = 1.0s
*.node[*].appl.qosUpdateInterval = 1.0s
*.node[*].appl.gameUpdateInterval = 1.0s
*.node[*].appl.decisionInterval = 1.0s

# 输出配置
output-vector-file = ${resultdir}/ablation_vectors_${modelType}_${repetition}.vec
output-scalar-file = ${resultdir}/ablation_scalars_${modelType}_${repetition}.sca

# 结果目录
result-dir = results/Ablation

# 随机种子配置
seed-set = ${repetition}

# 基础参数配置（相同的基础条件）
*.node[*].appl.fuzzyTrustAlpha = 0.3
*.node[*].appl.fuzzyTrustBeta = 0.4
*.node[*].appl.fuzzyTrustGamma = 0.3
*.node[*].appl.fuzzyTrustThreshold = 0.6

*.node[*].appl.qosUrgencyWeight = 0.4
*.node[*].appl.qosReliabilityWeight = 0.6
*.node[*].appl.qosDelayThreshold = 100ms
*.node[*].appl.qosLossThreshold = 0.05

*.node[*].appl.gameManager_learningRate = 0.1
*.node[*].appl.gameManager_explorationRate = 0.2
*.node[*].appl.gameManager_discountFactor = 0.9

*.node[*].appl.owarlAgent_eta = 0.03
*.node[*].appl.owarlAgent_lambda = 0.7
*.node[*].appl.owarlAgent_updatePeriod = 100

# RSU节点相同配置
*.rsu[*].appl.fuzzyTrustAlpha = 0.3
*.rsu[*].appl.fuzzyTrustBeta = 0.4
*.rsu[*].appl.fuzzyTrustGamma = 0.3
*.rsu[*].appl.fuzzyTrustThreshold = 0.6

*.rsu[*].appl.qosUrgencyWeight = 0.4
*.rsu[*].appl.qosReliabilityWeight = 0.6
*.rsu[*].appl.qosDelayThreshold = 100ms
*.rsu[*].appl.qosLossThreshold = 0.05

*.rsu[*].appl.gameManager_learningRate = 0.1
*.rsu[*].appl.gameManager_explorationRate = 0.2
*.rsu[*].appl.gameManager_discountFactor = 0.9

*.rsu[*].appl.owarlAgent_eta = 0.03
*.rsu[*].appl.owarlAgent_lambda = 0.7
*.rsu[*].appl.owarlAgent_updatePeriod = 100

# 数据收集基本配置
*.node[*].appl.enableDataCollection = true
*.node[*].appl.exportDataToCSV = true
*.rsu[*].appl.enableDataCollection = true
*.rsu[*].appl.exportDataToCSV = true

# 简化配置，专注于消融对照测试
[Config Ablation_Full_Model]
extends = Ablation_Study_Test
# 完整模型：启用所有模块
*.node[*].appl.enableIT2Module = true
*.node[*].appl.enableChoquetOWAModule = true
*.node[*].appl.enableOWARLModule = true
*.rsu[*].appl.enableIT2Module = true
*.rsu[*].appl.enableChoquetOWAModule = true
*.rsu[*].appl.enableOWARLModule = true

[Config Ablation_No_IT2]
extends = Ablation_Study_Test
# 无IT2模块：禁用IT2-Sigmoid信任评估
*.node[*].appl.enableIT2Module = false
*.node[*].appl.enableChoquetOWAModule = true
*.node[*].appl.enableOWARLModule = true
*.rsu[*].appl.enableIT2Module = false
*.rsu[*].appl.enableChoquetOWAModule = true
*.rsu[*].appl.enableOWARLModule = true

[Config Ablation_No_Choquet]
extends = Ablation_Study_Test
# 无Choquet-OWA模块：禁用双阶Choquet-OWA聚合
*.node[*].appl.enableIT2Module = true
*.node[*].appl.enableChoquetOWAModule = false
*.node[*].appl.enableOWARLModule = true
*.rsu[*].appl.enableIT2Module = true
*.rsu[*].appl.enableChoquetOWAModule = false
*.rsu[*].appl.enableOWARLModule = true

[Config Ablation_No_RL]
extends = Ablation_Study_Test
# 无OWA-RL模块：禁用自适应权重学习
*.node[*].appl.enableIT2Module = true
*.node[*].appl.enableChoquetOWAModule = true
*.node[*].appl.enableOWARLModule = false
*.rsu[*].appl.enableIT2Module = true
*.rsu[*].appl.enableChoquetOWAModule = true
*.rsu[*].appl.enableOWARLModule = false
*.rsu[*].appl.enableDataCollection = true
*.rsu[*].appl.exportDataToCSV = true

##########################################################
#            位置-策略联动和能源建模配置                  #
##########################################################

# 位置-策略联动配置
*.node[*].appl.enablePositionBasedStrategyUpdate = true
*.node[*].appl.positionUpdateThreshold = 50.0     # 位置变化触发阈值(米)

# RSU不需要位置-策略联动（位置固定）
*.rsu[*].appl.enablePositionBasedStrategyUpdate = false

# 能源建模配置
*.node[*].appl.enableDetailedEnergyModeling = true
*.node[*].appl.initialBatteryCapacity = 60000.0   # 60kWh初始电池容量
*.node[*].appl.basePowerConsumption = 200.0       # 200W基础功耗

# RSU能源配置（电力充足）
*.rsu[*].appl.enableDetailedEnergyModeling = false  # RSU不需要电池建模
*.rsu[*].appl.initialBatteryCapacity = 1000000.0    # 虚拟大容量
*.rsu[*].appl.basePowerConsumption = 500.0          # 更高基础功耗

##########################################################
#            Chapter 5.2 M1 烟雾测试配置                 #
##########################################################
# 仅用于验证 ITGameEngine 接入 FuzzyTrustApp 不崩溃。
# 60s 仿真，激活 Proposed 方法。SUMO 须能正常启动。
[Config Chapter52_M1_Smoke]
extends = General
sim-time-limit = 60s
*.node[*].appl.enableITGameEngine = true
*.node[*].appl.itGameMethod = "Proposed"
*.rsu[*].appl.enableITGameEngine = true
*.rsu[*].appl.itGameMethod = "Proposed"

##########################################################
#       Chapter 5.2 仿真一：车辆密度扫描 + 3 方法对比     #
##########################################################
# Nv ∈ {50, 100, 150, 200} × method ∈ {Greedy, FixedW, Proposed} × 5 种子 = 60 次
# 按 plan §3.2 / §5.3
[Config Chapter52_Exp1_Density]
extends = General
sim-time-limit = 600s
# 由 ${Nv} 选择 4 个 launchd 之一
*.manager.launchConfig = xmldoc("FuzzyVeins_ch52_Nv${Nv}.launchd.xml")
# iteration variables（OMNeT++ 笛卡尔积）
**.Nv = ${Nv=50,100,150,200}
*.numNodes = ${Nv}
*.node[*].appl.enableITGameEngine = true
*.rsu[*].appl.enableITGameEngine = true
*.node[*].appl.itGameMethod = ${method="Greedy","FixedW","Proposed"}
*.rsu[*].appl.itGameMethod = ${method}
*.node[*].appl.itGame_delta = 0.10
*.node[*].appl.itGame_alpha = 0.5
*.node[*].appl.itGame_lambda = 0.10
*.node[*].appl.itGame_beta = 0.30
*.rsu[*].appl.itGame_delta = 0.10
*.rsu[*].appl.itGame_alpha = 0.5
*.rsu[*].appl.itGame_lambda = 0.10
*.rsu[*].appl.itGame_beta = 0.30
*.rsu[*].appl.governancePeriod = 5s
*.rsu[*].appl.epsilonG = 1e-3
*.node[*].appl.maliciousRatio = 10
# 5 种子重复（${repetition} 是 OMNeT++ 预定义变量，由 repeat 自动取 0..repeat-1）
seed-set = ${repetition}
repeat = 5
# 结果目录按 Nv / method / seed 分层（plan §2.4）
result-dir = results/chapter52/exp1

##########################################################
#  Chapter 5.2 仿真二：消融实验（Full Proposed + 4 消融）  #
##########################################################
# 固定 Nv=150（中高密度），method ∈ {Full, NoIT2, NoGov, NoWFBRI, NoRobust}
# Full = Proposed（5.2.3 表 5-8 "完整方法基准"）
# 5 method × 5 seed = 25 runs，按 plan §3.2
[Config Chapter52_Exp2_Ablation]
extends = General
sim-time-limit = 300s
# 固定中高密度 Nv=150（单值 iteration var 让 logger 能识别 ${Nv}）
*.manager.launchConfig = xmldoc("FuzzyVeins_ch52_Nv150.launchd.xml")
**.Nv = ${Nv=150}
*.numNodes = ${Nv}
*.node[*].appl.enableITGameEngine = true
*.rsu[*].appl.enableITGameEngine = true
# Full 在 ITGameEngine::Method 里对应 Proposed；其他 4 个是消融变体
*.node[*].appl.itGameMethod = ${ablation="Proposed","NoIT2","NoGov","NoWFBRI","NoRobust"}
*.rsu[*].appl.itGameMethod = ${ablation}
*.node[*].appl.itGame_delta = 0.10
*.node[*].appl.itGame_alpha = 0.5
*.node[*].appl.itGame_lambda = 0.10
*.node[*].appl.itGame_beta = 0.30
*.rsu[*].appl.itGame_delta = 0.10
*.rsu[*].appl.itGame_alpha = 0.5
*.rsu[*].appl.itGame_lambda = 0.10
*.rsu[*].appl.itGame_beta = 0.30
*.rsu[*].appl.governancePeriod = 5s
*.rsu[*].appl.epsilonG = 1e-3
*.node[*].appl.maliciousRatio = 10
seed-set = ${repetition}
repeat = 5
result-dir = results/chapter52/exp2

