[General]
cmdenv-express-mode = true
cmdenv-autoflush = true
cmdenv-status-frequency = 1s
**.cmdenv-log-level = info

image-path = ../../images

network = FuzzyTrustScenario

##########################################################
#            Simulation parameters                       #
##########################################################
debug-on-errors = true
print-undisposed = true

# 1h
sim-time-limit = 3600s

**.scalar-recording = true
**.vector-recording = true

#*.playgroundSizeX = 2500m
#*.playgroundSizeY = 2500m
# 扩大仿真区域（需大于等于SUMO地图范围，具体查看*.net.xml中的 location convBoundary）
*.playgroundSizeX = 13547.82m
*.playgroundSizeY = 6056.65m
*.playgroundSizeZ = 50m

##########################################################
# Annotation parameters                                  #
##########################################################
*.annotations.draw = true

##########################################################
# Obstacle parameters                                    #
##########################################################
# Disabled obstacle configuration to avoid XML parsing errors
# *.obstacles.obstacles = xmldoc("config.xml", "//AnalogueModel[@type='SimpleObstacleShadowing']/obstacles")

##########################################################
#            TraCIScenarioManager parameters             #
##########################################################
*.manager.updateInterval = 1s
*.manager.host = "localhost"
*.manager.port = 9999
*.manager.autoShutdown = true
*.manager.launchConfig = xmldoc("FuzzyVeins.launchd.xml")


##########################################################
#                       RSU SETTINGS                     #
#                                                        #
#                                                        #
##########################################################

*.rsu[0].mobility.x = 7733
*.rsu[0].mobility.y = 6056.65 - 4686
*.rsu[0].mobility.z = 3

*.rsu[1].mobility.x = 6666
*.rsu[1].mobility.y = 6056.65 - 3082
*.rsu[1].mobility.z = 3

*.rsu[2].mobility.x = 8536
*.rsu[2].mobility.y = 6056.65 - 4378
*.rsu[2].mobility.z = 3

*.rsu[3].mobility.x = 6294
*.rsu[3].mobility.y = 6056.65 - 4539
*.rsu[3].mobility.z = 3

*.rsu[4].mobility.x = 5401
*.rsu[4].mobility.y = 6056.65 - 3260
*.rsu[4].mobility.z = 3

*.rsu[5].mobility.x = 9322
*.rsu[5].mobility.y = 6056.65 - 4056
*.rsu[5].mobility.z = 3

*.rsu[6].mobility.x = 4333
*.rsu[6].mobility.y = 6056.65 - 3772
*.rsu[6].mobility.z = 3

*.rsu[7].mobility.x = 8621
*.rsu[7].mobility.y = 6056.65 - 3396
*.rsu[7].mobility.z = 3

*.rsu[8].mobility.x = 7681
*.rsu[8].mobility.y = 6056.65 - 2550
*.rsu[8].mobility.z = 3

*.rsu[9].mobility.x = 9425
*.rsu[9].mobility.y = 6056.65 - 1837
*.rsu[9].mobility.z = 3


# RSU节点FuzzyTrust特定配置
*.rsu[*].appl.configFile = "config.json"
*.rsu[*].appl.decisionInterval = 0.1s
*.rsu[*].appl.isRSU = true
*.rsu[*].appl.isVehicleNode = false
*.rsu[*].appl.sendTrustBeacons = true


*.rsu[*].applType = "FuzzyTrustApp"
*.rsu[*].appl.headerLength = 80 bit
# *.rsu[*].appl.sendBeacons = false
*.rsu[*].appl.dataOnSch = false
# *.rsu[*].appl.beaconInterval = 1s
*.rsu[*].appl.beaconUserPriority = 7
*.rsu[*].appl.dataUserPriority = 5
*.rsu[*].nic.phy80211p.antennaOffsetZ = 0 m

##########################################################
#                      App Layer                         #
##########################################################

# 更新车辆节点配置为FuzzyTrustApp
*.node[*].applType = "FuzzyTrustApp"
*.node[*].appl.configFile = "config.json"
*.node[*].appl.decisionInterval = 0.1s
*.node[*].appl.isRSU = false
*.node[*].appl.taskUrgency = 0.7
*.node[*].appl.taskReliability = 0.8
*.node[*].appl.taskElasticity = 0.5
*.node[*].appl.sendTrustBeacons = true
*.node[*].appl.beaconInterval = 1s

##########################################################
#            11p specific parameters                     #
#                                                        #
#                    NIC-Settings                        #
##########################################################
*.connectionManager.sendDirect = true
*.connectionManager.maxInterfDist = 2600m
*.connectionManager.drawMaxIntfDist = false

*.**.nic.mac1609_4.useServiceChannel = false

*.**.nic.mac1609_4.txPower = 20mW
*.**.nic.mac1609_4.bitrate = 6Mbps
*.**.nic.phy80211p.minPowerLevel = -110dBm

*.**.nic.phy80211p.useNoiseFloor = true
*.**.nic.phy80211p.noiseFloor = -98dBm

*.**.nic.phy80211p.decider = xmldoc("config.xml")
*.**.nic.phy80211p.analogueModels = xmldoc("config.xml")
*.**.nic.phy80211p.usePropagationDelay = true

*.**.nic.phy80211p.antenna = xmldoc("antenna.xml", "/root/Antenna[@id='monopole']")
*.node[*].nic.phy80211p.antennaOffsetY = 0 m
*.node[*].nic.phy80211p.antennaOffsetZ = 1.895 m



##########################################################
#                      Mobility                          #
##########################################################
*.node[*].veinsmobility.x = 0
*.node[*].veinsmobility.y = 0
*.node[*].veinsmobility.z = 0
*.node[*].veinsmobility.setHostSpeed = false
*.node[*0].veinsmobility.accidentCount = 1
*.node[*0].veinsmobility.accidentStart = 73s
*.node[*0].veinsmobility.accidentDuration = 50s

[Config Default]

[Config WithBeaconing]
*.rsu[*].appl.sendBeacons = true
*.node[*].appl.sendBeacons = true

[Config WithChannelSwitching]
*.**.nic.mac1609_4.useServiceChannel = true
*.node[*].appl.dataOnSch = true
*.rsu[*].appl.dataOnSch = true


# 数据收集配置
*.node[*].appl.enableDataCollection = true    # 启用数据收集
*.node[*].appl.exportDataToCSV = true         # 导出CSV文件
*.node[*].appl.dataHistorySize = 1000         # 历史数据缓存大小
*.node[*].appl.enableResourceMonitoring = true # 启用资源监控
*.node[*].appl.energyUpdateInterval = 1s       # 能量更新间隔

# RSU数据收集配置
*.rsu[*].appl.enableDataCollection = true
*.rsu[*].appl.exportDataToCSV = true
*.rsu[*].appl.dataHistorySize = 1000
*.rsu[*].appl.enableResourceMonitoring = true
*.rsu[*].appl.energyUpdateInterval = 1s



##########################################################
#            策略选择历史数据收集配置                      #
##########################################################

# 策略选择历史收集配置
*.node[*].appl.enableStrategyHistoryCollection = true
*.node[*].appl.exportStrategyHistoryToCSV = true
*.node[*].appl.strategyHistorySize = 500
*.node[*].appl.enableStrategyStatistics = true

# 博弈理论相关配置
*.node[*].appl.gameManager_learningRate = 0.1
*.node[*].appl.gameManager_explorationRate = 0.1
*.node[*].appl.gameManager_discountFactor = 0.9

# 模糊信任评估配置
*.node[*].appl.fuzzyTrust_threshold = 0.6
*.node[*].appl.fuzzyTrust_updateInterval = 1.0

# QoS评估配置
*.node[*].appl.qos_urgencyWeight = 0.6
*.node[*].appl.qos_reliabilityWeight = 0.4
*.node[*].appl.qos_couplingFactor = 0.5

# OWA-RL配置
*.node[*].appl.owarlAgent_eta = 0.1
*.node[*].appl.owarlAgent_lambda = 0.9
*.node[*].appl.owarlAgent_updatePeriod = 10

# RSU策略选择历史收集配置
*.rsu[*].appl.enableStrategyHistoryCollection = true
*.rsu[*].appl.exportStrategyHistoryToCSV = true
*.rsu[*].appl.strategyHistorySize = 500
*.rsu[*].appl.enableStrategyStatistics = true
*.rsu[*].appl.gameManager_learningRate = 0.1
*.rsu[*].appl.gameManager_explorationRate = 0.1
*.rsu[*].appl.gameManager_discountFactor = 0.9

##########################################################
#            MAE性能评估配置                             #
##########################################################

# MAE性能评估配置 - 用于IT2-Sigmoid信任评估 vs MAE vs 恶意节点比例的性能图生成
[Config MAE_Performance_Test]
extends = General

cmdenv-express-mode = true
cmdenv-autoflush = true
cmdenv-status-frequency = 1s
**.cmdenv-log-level = info

# 仿真基本参数
sim-time-limit = 300s
repeat = 10  # 每个恶意节点比例运行10次独立实验

# MAE数据收集配置
*.node[*].appl.enableMAECollection = true
*.node[*].appl.exportMAEToCSV = true
*.node[*].appl.maeExperimentRuns = 10
*.node[*].appl.currentExperimentRun = ${repetition}

# 恶意节点比例配置（0%, 10%, 20%, 30%, 40%, 50%）
*.node[*].appl.maliciousRatio = ${maliciousRatio=0, 10, 20, 30, 40, 50}

# 节点数量配置
*.numNodes = 50

# 信任更新间隔（更频繁的更新以获得更多数据点）
*.node[*].appl.trustUpdateInterval = 1s

# 输出配置
output-vector-file = ${resultdir}/mae_vectors_${maliciousRatio}_${repetition}.vec
output-scalar-file = ${resultdir}/mae_scalars_${maliciousRatio}_${repetition}.sca

# 结果目录
result-dir = results/mae_performance

# 随机种子配置（确保每次实验的随机性）
seed-set = ${repetition}

# 模糊信任评估参数（覆盖默认值）
*.node[*].appl.fuzzyTrustAlpha = 0.3
*.node[*].appl.fuzzyTrustBeta = 0.4
*.node[*].appl.fuzzyTrustGamma = 0.3
*.node[*].appl.fuzzyTrustThreshold = 0.6

# QoS参数（覆盖默认值）
*.node[*].appl.qosUrgencyWeight = 0.4
*.node[*].appl.qosReliabilityWeight = 0.6
*.node[*].appl.qosThreshold = 0.7

# 博弈理论参数（覆盖默认值）
*.node[*].appl.gameCooperationReward = 3.0
*.node[*].appl.gameDefectionPenalty = 1.0
*.node[*].appl.gameTemptation = 5.0
*.node[*].appl.gameSuckerPayoff = 0.0

# OWA-RL参数（覆盖默认值）
*.node[*].appl.owaLearningRate = 0.1
*.node[*].appl.owaDiscountFactor = 0.9
*.node[*].appl.owaExplorationRate = 0.1
*.node[*].appl.owaWeightUpdateInterval = 10.0

##########################################################
#            OWAL-RL权重演化性能测试配置                  #
##########################################################

# OWAL-RL权重演化专用配置 - 用于生成第三个性能图表
[Config OWARL_Weight_Evolution_Test]
extends = General

cmdenv-express-mode = true
cmdenv-autoflush = true
cmdenv-status-frequency = 1s
**.cmdenv-log-level = info

# 仿真基本参数
sim-time-limit = 300s
repeat = 5  # 运行5次独立实验以获得统计数据

# OWAL-RL权重收集核心配置
*.node[*].appl.enableOWARLWeightCollection = true
*.node[*].appl.exportOWARLWeightsToCSV = true
*.node[*].appl.owarlSamplingInterval = 0.5s
*.node[*].appl.owarlOutputDirectory = "results/OWAL-RL/data/"

*.rsu[*].appl.enableOWARLWeightCollection = true
*.rsu[*].appl.exportOWARLWeightsToCSV = true
*.rsu[*].appl.owarlSamplingInterval = 0.5s
*.rsu[*].appl.owarlOutputDirectory = "results/OWAL-RL/data/"

# 节点数量配置（确保有足够数据）
*.numNodes = 30

# 更新间隔配置（快速权重适应）
*.node[*].appl.trustUpdateInterval = 0.5s
*.node[*].appl.qosUpdateInterval = 0.5s
*.node[*].appl.gameUpdateInterval = 0.5s
*.node[*].appl.decisionInterval = 0.5s

# 输出配置
output-vector-file = ${resultdir}/owarl_vectors_${repetition}.vec
output-scalar-file = ${resultdir}/owarl_scalars_${repetition}.sca

# 结果目录
result-dir = results/OWAL-RL

# 随机种子配置
seed-set = ${repetition}

# OWA-RL特化参数（促进权重快速变化）
*.node[*].appl.owarlAgent_eta = 0.08          # 学习率η
*.node[*].appl.owarlAgent_lambda = 0.7        # 正则化参数λ  
*.node[*].appl.owarlAgent_updatePeriod = 2    # 更新周期（秒）

*.rsu[*].appl.owarlAgent_eta = 0.08
*.rsu[*].appl.owarlAgent_lambda = 0.7
*.rsu[*].appl.owarlAgent_updatePeriod = 2

# 场景变化配置（促进不同拥塞场景）
*.node[*].appl.qosDelayThreshold = 50ms       # 较低延迟阈值
*.node[*].appl.qosLossThreshold = 0.03        # 较低丢包阈值
*.node[*].appl.resourceCpuThreshold = 0.7     # CPU使用率阈值
*.node[*].appl.resourceBandwidthThreshold = 0.8 # 带宽使用率阈值

# 信任评估参数
*.node[*].appl.fuzzyTrustThreshold = 0.65     # 信任阈值
*.node[*].appl.fuzzyTrustAlpha = 0.4
*.node[*].appl.fuzzyTrustBeta = 0.3
*.node[*].appl.fuzzyTrustGamma = 0.3

# 博弈理论参数（增强策略选择变化）
*.node[*].appl.gameManager_learningRate = 0.15
*.node[*].appl.gameManager_explorationRate = 0.25
*.node[*].appl.gameManager_discountFactor = 0.85

# 数据收集基本配置
*.node[*].appl.enableDataCollection = true
*.node[*].appl.exportDataToCSV = true
*.rsu[*].appl.enableDataCollection = true
*.rsu[*].appl.exportDataToCSV = true

# FuzzyVeins通用配置
[Config FuzzyVeins]
extends = General

# 基本仿真参数
sim-time-limit = 300s
cmdenv-express-mode = true

##########################################################
#            Choquet-OWA性能数据收集配置                 #
##########################################################

# Choquet-OWA数据收集配置 - 用于双阶资源聚合性能分析
[Config ChoquetOWA_Performance]
extends = General
cmdenv-express-mode = true
cmdenv-autoflush = true
cmdenv-status-frequency = 1s
**.cmdenv-log-level = info

# 仿真基本参数
sim-time-limit = 300s
# 3种任务类型，每种30次重复，总共90次实验
repeat = 30

# 参数化变量定义：任务类型
*.node[*].appl.currentTaskType = ${taskType="compute_intensive", "bandwidth_sensitive", "energy_sensitive"}
