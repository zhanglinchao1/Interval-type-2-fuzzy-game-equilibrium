# Choquet-OWA数据收集配置
*.node[*].appl.enableChoquetOWACollection = true
*.node[*].appl.exportChoquetOWAToCSV = true
*.node[*].appl.choquetSamplingInterval = 1.0s
*.node[*].appl.choquetOutputDirectory = "results/choquet_owa/data/"

# 节点数量配置（20辆车+10个RSU=30个节点）
*.numNodes = 20

# 实验运行次数配置
*.node[*].appl.maeExperimentRuns = 30
*.node[*].appl.currentExperimentRun = ${repetition}

# 输出配置
output-vector-file = ${resultdir}/choquet_vectors_${taskType}_${repetition}.vec
output-scalar-file = ${resultdir}/choquet_scalars_${taskType}_${repetition}.sca

# 结果目录
result-dir = results/choquet_owa

# 随机种子配置
seed-set = ${repetition}

# RSU Choquet-OWA配置
*.rsu[*].appl.enableChoquetOWACollection = true
*.rsu[*].appl.exportChoquetOWAToCSV = true
*.rsu[*].appl.choquetSamplingInterval = 1.0s
*.rsu[*].appl.choquetOutputDirectory = "results/choquet_owa/data/"

# 默认Choquet-OWA配置（应用于所有配置）
*.node[*].appl.enableChoquetOWACollection = true
*.node[*].appl.exportChoquetOWAToCSV = true
*.node[*].appl.choquetSamplingInterval = 1.0s
*.node[*].appl.choquetOutputDirectory = "results/choquet_owa/data/"
*.node[*].appl.currentTaskType = "compute_intensive"

*.rsu[*].appl.enableChoquetOWACollection = true
*.rsu[*].appl.exportChoquetOWAToCSV = true
*.rsu[*].appl.choquetSamplingInterval = 1.0s
*.rsu[*].appl.choquetOutputDirectory = "results/choquet_owa/data/"
*.rsu[*].appl.currentTaskType = "compute_intensive"

##########################################################
#            车辆混合策略数据收集配置                    #
##########################################################

# 车辆混合策略数据收集配置（默认启用）
*.node[*].appl.enableMixingStrategyCollection = true
*.node[*].appl.exportMixingStrategyToCSV = true
*.node[*].appl.mixingStrategySamplingInterval = 1.0s
*.node[*].appl.mixingStrategyOutputDirectory = "results/Vehicle Mixing Strategy/data/"

# RSU车辆混合策略数据收集配置
*.rsu[*].appl.enableMixingStrategyCollection = true
*.rsu[*].appl.exportMixingStrategyToCSV = true
*.rsu[*].appl.mixingStrategySamplingInterval = 1.0s
*.rsu[*].appl.mixingStrategyOutputDirectory = "results/Vehicle Mixing Strategy/data/"

##########################################################
#            车辆混合策略分布演化测试配置                #
##########################################################

