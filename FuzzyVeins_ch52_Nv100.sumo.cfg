<?xml version="1.0" encoding="UTF-8"?>
<configuration>
    <input>
        <net-file value="FuzzyVeins.net.xml"/>
        <route-files value="FuzzyVeins_small_Nv100.rou.xml"/>
    </input>
    <time>
        <begin value="0"/>
        <end value="600"/>
        <step-length value="0.1"/>
